<!--- Classe: Catalogo-->

<!DOCTYPE html>  <!-- Serve para informar ao navegador o tipo de documento, que no caso eh html -->
<html lang="en"> <!-- a tag <html> eh a raiz do html, envolve todo o conteudo do HTML. Ja a "lang" serve para especificar ao navegador o idioma utilizado -->
<head> <!--  serve para definir o que nao sera exibido no site, que sao dados sobre o documento-->
    <meta charset="UTF-8">  <!--- a tag meta serve para informar o metadados. O Charset define o conjunto de caracteres usado na pagina-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--- A tag "name" serve para indentificar os elementos enviados de formularios. A tag "content" define a escala incial-->
    <title> Catalogo </title> <!--- titulo da pagina-->
    <link rel="stylesheet" href="style.css"> <!--- a tag <link> serve para estabelecer conexao entre os documentos, que nesse caso esta pegando da tag <href> . A tag <rel> serve para declarar que o arquivo eh uma folha de estilo-->
</head>
<body> <!-- Eh o corpo do HTML, contendo elementos visuais da pagina-->

    <div class="cards">  
        <!-- atributos: img,link-->
        <img src="download.png" alt="logo do ifsp" width="200">
        <br> </br> <!--- pula linha -->
        <a href="https://moodle.slt.ifsp.edu.br/my/" target="_blank"> <!--- a tag <a> serve para colocar link -->
            <button> clica aqui para entrar no moodle</button> <!--- a tag <button> criar um botao interativo-->
        </a>
    </div>
    <p> licao de desenvolvimento Web</p> <!-- tag de blocos de textos-->
</body>
</html>
